<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Luces y Sentimientos</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #121212; color: white; padding: 20px; margin: 0; }
        .contenedor { max-width: 450px; margin: auto; background: #1f1f1f; padding: 30px; border-radius: 25px; border: 1px solid #333; }
        .logo { width: 150px; height: auto; margin-bottom: 20px; border-radius: 50%; border: 2px solid #e67e22; }
        h2 { color: #fdfdfd; margin-bottom: 5px; }
        input { padding: 15px; width: 90%; border-radius: 10px; border: 1px solid #444; margin-bottom: 20px; background: #2a2a2a; color: white; text-align: center; font-size: 18px; }
        button { padding: 15px; background: #28a745; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 18px; width: 100%; }
        .seccion-practica { display: none; margin-top: 20px; }
        .video-box { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; margin-bottom: 20px; border-radius: 15px; background: #000; }
        .video-box iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
        audio { width: 100%; margin: 20px 0; }
        #btnFinalizar { background: #d9534f; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="contenedor" id="login">
        <img src="logo.png" alt="Luces y Sentimientos" class="logo">
        <h1>Luces y Sentimientos</h1>
        <p>Pon aquí tu contraseña:</p>
        <input type="password" id="pass" placeholder="Contraseña">
        <button onclick="verificar()">ENTRAR</button>
    </div>

    <div id="entrenamiento" class="seccion-practica">
        <div class="contenedor">
            <h2 id="saludo"></h2>
            <hr style="border: 0.5px solid #444; margin: 20px 0;">

            <h3>1. Respiración Diafragmática</h3>
            <div class="video-box">
                <iframe src="https://www.youtube.com/embed/FI2vk3o_pSA" allowfullscreen></iframe>
            </div>

            <h3>2. Vocalización Dirigida</h3>
            <div class="video-box" id="videoPersonal"></div>

            <h3>3. Pista de Ensayo</h3>
            <p><strong>PIEL CANELA</strong></p>
            <audio controls>
                <source src="PIEL%20CANELA.m4a" type="audio/mp4">
                Tu navegador no soporta el audio.
            </audio>

            <button id="btnFinalizar" onclick="registrarAsistencia()">FINALIZAR PRÁCTICA</button>
        </div>
    </div>

    <script>
        const grupos = {
            "diamantes2": { nombre: "Vanessa / Anel", v: "xNhiXqHX0f4" },
            "refuerzo-alfa": { nombre: "Raul / Roberto", v: "e8k7ZvY6hao" },
            "graves-de-poder": { nombre: "Heidy / Nahomi", v: "a621IZdXuus" },
            "fuerza-central": { nombre: "Fabio", v: "9C7povzzMgI" },
            "comando-poder": { nombre: "Tadeo", v: "JCnVXxNb6Qc" }
        };

        function verificar() {
            const clave = document.getElementById("pass").value.trim();
            if (grupos[clave]) {
                document.getElementById("login").style.display = "none";
                document.getElementById("entrenamiento").style.display = "block";
                document.getElementById("saludo").innerText = "Hola, " + grupos[clave].nombre;
                document.getElementById("videoPersonal").innerHTML = 
                    `<iframe src="https://www.youtube.com/embed/${grupos[clave].v}" allowfullscreen></iframe>`;
            } else {
                alert("Clave incorrecta.");
            }
        }

        function registrarAsistencia() {
            const FORM_URL = "https://docs.google.com/forms/d/e/1FAIpQLSfD3Pk3L6VRP4WFV1U7X4rLTGP5X8H8H8t0zK3A/formResponse";
            const ENTRY_ID = "entry.1388268004";
            const nombre = document.getElementById("saludo").innerText;
            
            let datos = new FormData();
            datos.append(ENTRY_ID, nombre + " - Terminó Piel Canela");

            fetch(FORM_URL, { method: "POST", mode: "no-cors", body: datos })
            .then(() => {
                alert("Registro enviado al Excel.");
                location.reload();
            }).catch(() => { location.reload(); });
        }
    </script>
</body>
</html>
