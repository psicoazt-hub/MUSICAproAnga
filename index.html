<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUCES Y SENTIMIENTOS</title>
    
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="icon" type="image/png" href="icon.png">
    
    <style>
        :root {
            --oro: #D4AF37;
            --cromo: #E8E8E8;
            --fondo: #0a0a0a;
        }
        body {
            background-color: var(--fondo);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        .container { max-width: 500px; margin: auto; }
        .logo { width: 120px; margin-bottom: 20px; filter: drop-shadow(0 0 10px var(--oro)); }
        h1 { color: var(--oro); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 30px; }
        
        input {
            width: 85%;
            padding: 15px;
            margin: 10px 0;
            border-radius: 30px;
            border: 2px solid var(--oro);
            background: #1a1a1a;
            color: white;
            text-align: center;
            font-size: 16px;
        }
        
        button {
            background: linear-gradient(145deg, #D4AF37, #B8860B);
            color: black;
            border: none;
            padding: 15px 40px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.4);
        }

        .video-card {
            background: #1a1a1a;
            padding: 15px;
            border-radius: 20px;
            margin-top: 25px;
            border: 1px solid #333;
        }

        .locked { opacity: 0.2; pointer-events: none; }
        iframe { width: 100%; border-radius: 15px; border: 1px solid var(--oro); height: 250px; }
        #mensaje { margin-top: 20px; color: #888; font-style: italic; }
    </style>
</head>
