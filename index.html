<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taller de Música</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 20px; background-color: #f4f4f4; }
        .box { background: white; padding: 20px; border-radius: 10px; box-shadow: 0px 0px 10px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        input { width: 80%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
        button { background: #28a745; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 5px; }
        #video-container { display: none; margin-top: 20px; }
        iframe { width: 100%; height: 250px; border-radius: 10px; }
    </style>
</head>
<body>

<div class="box">
    <h2>Taller de Música</h2>
    <div id="login">
        <p>Escribe tu nombre:</p>
        <input type="text" id="nombreAlumno" placeholder="Ej. Raul">
        <br>
        <button onclick="acceder()">Entrar</button>
    </div>

    <div id="video-container">
        <h3 id="etapa">Nivel 1: Respiración</h3>
        <iframe id="reproductor" src="" frameborder="0" allowfullscreen></iframe>
        <br><br>
        <button id="btnSig" onclick="siguienteNivel()" style="background:#007bff;">Siguiente Nivel</button>
    </div>
    <p id="error" style="color:red;"></p>
</div>

<script>
    // ESTE ES TU LINK DE LAS 6:35 PM
    const scriptURL = "https://script.google.com/macros/s/AKfycbyC-qG1e_M0vXpX5fQvY7Z2p7_7_uE0-Z8_U9R-m-2V-v1_X_X/exec";
    let datosAlumno = null;

    function acceder() {
        const nombre = document.getElementById("nombreAlumno").value.trim();
        if(!nombre) return;

        fetch(`${scriptURL}?nombre=${nombre}`)
        .then(res => res.json())
        .then(data => {
            if(data.error) {
                document.getElementById("error").innerText = "Nombre no encontrado";
            } else {
                datosAlumno = data;
                document.getElementById("login").style.display = "none";
                document.getElementById("error").innerText = "";
                document.getElementById("video-container").style.display = "block";
                
                // Carga Respiración
                document.getElementById("reproductor").src = `https://www.youtube.com/embed/${data.respiracion}`;
            }
        })
        .catch(err => {
            document.getElementById("error").innerText = "Error de conexión";
            console.error(err);
        });
    }

    function siguienteNivel() {
        document.getElementById("etapa").innerText = "Nivel 2: Vocalización";
        document.getElementById("reproductor").src = `https://www.youtube.com/embed/${datosAlumno.vocalizacion}`;
        document.getElementById("btnSig").style.display = "none";

        // Registro automático en tu Excel
        fetch(scriptURL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify({ nombre: document.getElementById("nombreAlumno").value })
        });
    }
</script>

</body>
</html>
