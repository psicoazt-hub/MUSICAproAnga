<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taller de Música Pro</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; padding: 20px; background-color: #1a1a1a; color: white; }
        .box { background: #2d2d2d; padding: 30px; border-radius: 15px; box-shadow: 0px 10px 30px rgba(0,0,0,0.5); max-width: 420px; margin: auto; border: 1px solid #ceac00; }
        input { width: 90%; padding: 12px; margin: 15px 0; border-radius: 8px; border: 1px solid #444; background: #333; color: white; font-size: 16px; text-align: center; }
        button { background: #ceac00; color: black; border: none; padding: 12px; cursor: pointer; border-radius: 8px; font-weight: bold; width: 100%; font-size: 16px; }
        #video-container { display: none; margin-top: 20px; }
        iframe { width: 100%; height: 250px; border-radius: 10px; border: 2px solid #ceac00; }
        #status { color: #ffd700; margin-top: 10px; font-size: 14px; }
    </style>
</head>
<body>

<div class="box">
    <h2 style="color: #ceac00;">MÚSICA PRO</h2>
    <p style="font-size: 14px; color: #aaa;">Taller de Canto - Angamacutiro</p>
    
    <div id="login">
        <p>Escribe tu nombre para entrar:</p>
        <input type="text" id="nombreAlumno" placeholder="Ej: Vanessa">
        <button onclick="acceder()">ENTRAR AL TALLER</button>
        <p id="status"></p>
    </div>

    <div id="video-container">
        <h3 id="etapa" style="color: #ceac00;">Nivel 1: Respiración</h3>
        <iframe id="reproductor" src="" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
    </div>
</div>

<script>
    // TU LINK REAL DE LA VERSIÓN 7
    const scriptURL = "https://script.google.com/macros/s/AKfycba9oViVSE-iXa79fxnNMWy6RLzV9IgTpOEFTRI0lO_VH43BLTq5Mv74cVEZMKfxTfHo/exec";

    function acceder() {
        const nombre = document.getElementById("nombreAlumno").value.trim();
        const statusDiv = document.getElementById("status");
        
        if(!nombre) {
            statusDiv.innerText = "⚠️ Escribe tu nombre.";
            return;
        }

        statusDiv.innerText = "🔍 Buscando en la lista...";

        fetch(`${scriptURL}?nombre=${nombre}`)
        .then(res => res.json())
        .then(data => {
            if(data.error) {
                statusDiv.innerText = "❌ No estás en la lista. Revisa mayúsculas.";
            } else {
                document.getElementById("login").style.display = "none";
                document.getElementById("video-container").style.display = "block";
                
                // Carga el video de YouTube que le toca
                const videoId = data.respiracion;
                document.getElementById("reproductor").src = "https://www.youtube.com/embed/" + videoId;
            }
        })
        .catch(err => {
            statusDiv.innerText = "⚠️ Error de conexión. Intenta de nuevo.";
            console.error(err);
        });
    }
</script>

</body>
</html>
