<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taller de Música Pro</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; padding: 20px; background-color: #1a1a1a; color: white; }
        .box { background: #2d2d2d; padding: 30px; border-radius: 15px; box-shadow: 0px 10px 30px rgba(0,0,0,0.5); max-width: 450px; margin: auto; border: 1px solid #444; }
        input { width: 90%; padding: 12px; margin: 15px 0; border: 1px solid #555; border-radius: 8px; background: #333; color: white; font-size: 16px; }
        button { background: #ceac00; color: black; border: none; padding: 12px 25px; cursor: pointer; border-radius: 8px; font-weight: bold; font-size: 16px; width: 100%; transition: 0.3s; }
        button:hover { background: #ffd700; }
        #video-container { display: none; margin-top: 20px; }
        iframe { width: 100%; height: 250px; border-radius: 10px; border: 2px solid #ceac00; }
        #error { color: #ff4d4d; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div class="box">
    <h2 style="color: #ceac00;">Taller de Música</h2>
    <div id="login">
        <p>Ingresa tu nombre para comenzar:</p>
        <input type="text" id="nombreAlumno" placeholder="Ej. Raul, Vanessa, Heidy...">
        <button onclick="acceder()">ENTRAR AL TALLER</button>
        <p id="error"></p>
    </div>

    <div id="video-container">
        <h3 id="etapa" style="color: #ceac00;">Nivel 1: Respiración</h3>
        <div id="player">
            <iframe id="reproductor" src="" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        </div>
        <br>
        <button id="btnSig" onclick="siguienteNivel()" style="background:#007bff; color:white;">PASAR A VOCALIZACIÓN</button>
    </div>
</div>

<script>
    // TU NUEVO LINK DE GOOGLE SCRIPT (VERSIÓN 6)
    const scriptURL = "https://script.google.com/macros/s/AKfycbycAn3MskY8Oclm0Yp89W6Y84T8z9E0v5x90y8S9z5k7u_l9P_P/exec";
    let datosAlumno = null;

    function acceder() {
        const nombre = document.getElementById("nombreAlumno").value.trim();
        const errorDiv = document.getElementById("error");
        
        if(!nombre) {
            errorDiv.innerText = "Por favor, escribe tu nombre.";
            return;
        }

        errorDiv.innerText = "Conectando...";

        fetch(`${scriptURL}?nombre=${nombre}`)
        .then(res => res.json())
        .then(data => {
            if(data.error) {
                errorDiv.innerText = "Nombre no encontrado en la lista.";
            } else {
                datosAlumno = data;
                document.getElementById("login").style.display = "none";
                document.getElementById("video-container").style.display = "block";
                
                // Carga el video de Respiración desde tu Excel
                const videoId = data.respiracion;
                document.getElementById("reproductor").src = `https://www.youtube.com/embed/${videoId}?rel=0`;
            }
        })
        .catch(err => {
            errorDiv.innerText = "Error de conexión. Revisa tu internet.";
            console.error(err);
        });
    }

    function siguienteNivel() {
        // Cambia al video de Vocalización
        document.getElementById("etapa").innerText = "Nivel 2: Vocalización";
        document.getElementById("reproductor").src = `https://www.youtube.com/embed/${datosAlumno.vocalizacion}?rel=0&autoplay=1`;
        document.getElementById("btnSig").style.display = "none";

        // Registra el avance en tu Excel automáticamente
        fetch(scriptURL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify({ nombre: document.getElementById("nombreAlumno").value })
        });
    }
</script>

</body>
</html>
