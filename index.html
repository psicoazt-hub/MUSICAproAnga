<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Entrenamiento Vocal - Dra. Voz</title>
    <style>
        /* Estilos para que funcione en Android e iPhone */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            text-align: center; 
            background: #1a1a1a; 
            color: white; 
            padding: 20px;
            margin: 0;
        }
        .contenedor { 
            max-width: 450px; 
            margin: auto; 
            background: #333; 
            padding: 25px; 
            border-radius: 20px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        /* Ajuste para la imagen de la Rondalla */
        .logo { 
            width: 120px; 
            height: auto; 
            margin-bottom: 15px; 
            border-radius: 50%;
            border: 2px solid #28a745;
        }
        input { 
            padding: 12px; 
            width: 85%; 
            border-radius: 8px; 
            border: none; 
            margin-bottom: 15px; 
            font-size: 16px; /* Evita zoom automático en iPhone */
        }
        button { 
            padding: 15px 30px; 
            background: #28a745; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 16px;
            width: 90%;
        }
        .video-container { display: none; margin-top: 20px; }
        .reproductor {
            position: relative;
            padding-bottom: 56.25%; /* Relación de aspecto 16:9 */
            height: 0;
            overflow: hidden;
            margin-bottom: 20px;
            border-radius: 12px;
        }
        .reproductor iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }
        #btnFinalizar { background: #d9534f; margin-top: 30px; }
    </style>
</head>
<body>

<div class="contenedor" id="login">
    <img src="logo.png" alt="Rondalla" class="logo">
    <h2>🚀 Control de Escuadras</h2>
    <p>Introduce tu clave de acceso:</p>
    <input type="password" id="pass" placeholder="Clave militar...">
    <br>
    <button onclick="verificar()">INICIAR ENTRENAMIENTO</button>
</div>

<div id="entrenamiento" class="video-container">
    <h2 id="saludo"></h2>
    
    <h3>1. Respiración (General)</h3>
    <div class="reproductor">
        <div id="video1"></div>
    </div>

    <h3>2. Vocalización de Escuadra</h3>
    <div class="reproductor">
        <div id="video2"></div>
    </div>
    
    <button id="btnFinalizar" onclick="registrarAsistencia()">FINALIZAR Y SALIR</button>
</div>

<script>
// Base de datos de escuadras y videos
const grupos = {
    "diamantes2": { nombre: "Vanessa/Anel", v: "FI2WXlo_p5A" },
    "refuerzo-alfa": { nombre: "Raul/Roberto", v: "KhLHMpUEmtE" },
    "graves-de-poder": { nombre: "Heidy/Nahomi", v: "9PmTOWQlIQI" },
    "fuerza-central": { nombre: "Fabio", v: "iWlIJC0GLBo" },
    "comando-poder": { nombre: "Tadeo", v: "kXx6fE2PMFs" }
};

let alumnoActual = "";

function verificar() {
    let clave = document.getElementById("pass").value.toLowerCase().trim();
    if (grupos[clave]) {
        alumnoActual = grupos[clave].nombre;
        document.getElementById("login").style.display = "none";
        document.getElementById("entrenamiento").style.display = "block";
        document.getElementById("saludo").innerText = "¡En guardia, " + alumnoActual + "!";
        
        // Carga de videos compatible con móviles
        document.getElementById("video1").innerHTML = `<iframe src="https://www.youtube.com/embed/Bu1xgyCO0Ps?rel=0" allowfullscreen></iframe>`;
        document.getElementById("video2").innerHTML = `<iframe src="https://www.youtube.com/embed/${grupos[clave].v}?rel=0" allowfullscreen></iframe>`;
    } else {
        alert("Clave no reconocida. Intenta de nuevo.");
    }
}

function registrarAsistencia() {
    const FORM_URL = "https://docs.google.com/forms/d/e/1FAIpQLScPYbJ9L57BNI8PWePVVraifNihkflPZsdE8UlhasbiDRlqQA/formResponse";
    const ENTRY_ID = "entry.1388268004"; 
    
    let datos = new FormData();
    datos.append(ENTRY_ID, alumnoActual + " - Terminó Práctica");

    // Registro invisible
    fetch(FORM_URL, {
        method: "POST",
        mode: "no-cors",
        body: datos
    }).then(() => {
        alert("¡Misión cumplida! Tu asistencia ha sido registrada.");
        location.reload(); 
    }).catch(() => {
        alert("Asistencia enviada.");
        location.reload();
    });
}
</script>

</body>
</html>
